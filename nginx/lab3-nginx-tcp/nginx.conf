# THE EVENTS BLOCK
# This section is mandatory. It defines how Nginx handles 
# low-level network connections.
events {
    # The maximum number of simultaneous connections 
    # that can be opened by a worker process.
    worker_connections 1024;
}

# THE STREAM BLOCK
# This is used for TCP and UDP load balancing (Layer 4).
# We use this instead of 'http' because PostgreSQL uses its own binary protocol.
stream {

    # UPSTREAM GROUP: database-cluster
    # Defines the pool of backend PostgreSQL servers.
    upstream database-cluster {
        # Round Robin is the default balancing method.
        # max_fails: Number of failed attempts before considering the server 'down'.
        # fail_timeout: How long to wait before trying a 'down' server again.
        server pg1:5432 max_fails=3 fail_timeout=30s;
        server pg2:5432 max_fails=3 fail_timeout=30s;
        server pg3:5432 max_fails=3 fail_timeout=30s;
    }

    # SERVER BLOCK
    # Defines how Nginx listens for incoming database connections.
    server {
        # Nginx will listen on port 5432 on all available interfaces.
        listen 5432;

        # Forward all traffic received on port 5432 to the 'database-cluster' group.
        proxy_pass database-cluster;

        # TIMEOUTS
        # How long Nginx waits to establish a connection with the backend DB.
        proxy_connect_timeout 2s;

        # How long to keep the connection open between the client and the backend
        # if no data is being sent. Increase this for long-running queries.
        proxy_timeout 10m;
    }
}
