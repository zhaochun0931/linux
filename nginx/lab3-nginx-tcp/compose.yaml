services:
  nginx:
    image: nginx:latest
    container_name: web-server
    ports:
      - "5432:5432"
    networks:
      - frontend_net
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - pg1
      - pg2
      - pg3

  pg1:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: password
    networks:
      - frontend_net

  pg2:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: password
    networks:
      - frontend_net

  pg3:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: password
    networks:
      - frontend_net

networks:
  frontend_net:
    driver: bridge
