services:
  nginx:
    image: nginx:latest
    container_name: web-server
    ports:
      - "80:80"
    networks:
      - frontend_net
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2

  web1:
    image: luksa/kubia:latest
    networks:
      - frontend_net

  web2:
    image: luksa/kubia:latest
    networks:
      - frontend_net

networks:
  frontend_net:
    driver: bridge
