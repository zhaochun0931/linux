services:
  # 1. The Master Node (Handles Reads & Writes)
  redis-master:
    image: redis:8-alpine
    container_name: redis-master
    ports:
      - "6379:6379"  # Exposed to host for external apps
    volumes:
      - ./master-data:/data
    networks:
      - redis-replication-net
    # We set a password for the master
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "password"]
    restart: unless-stopped

  # 2. Replica Node 1 (Read-Only)
  redis-replica-1:
    image: redis:8-alpine
    container_name: redis-replica-1
    ports:
      - "6380:6379"  # Exposed on host port 6380
    volumes:
      - ./replica1-data:/data
    networks:
      - redis-replication-net
    depends_on:
      - redis-master
    # Inside the container, it connects to 'redis-master' on port 6379
    command: >
      redis-server 
      --appendonly yes 
      --requirepass password
      --replicaof redis-master 6379 
      --masterauth password
    restart: unless-stopped

  # 3. Replica Node 2 (Read-Only)
  redis-replica-2:
    image: redis:8-alpine
    container_name: redis-replica-2
    ports:
      - "6381:6379"  # Exposed on host port 6381
    volumes:
      - ./replica2-data:/data
    networks:
      - redis-replication-net
    depends_on:
      - redis-master
    command: >
      redis-server 
      --appendonly yes 
      --requirepass password
      --replicaof redis-master 6379 
      --masterauth password
    restart: unless-stopped

networks:
  redis-replication-net:
    driver: bridge
