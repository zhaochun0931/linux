apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-load-script
data:
  bulk_load.py: |
    import os
    import sys
    from redis.sentinel import Sentinel, MasterNotFoundError

    # 1. Configuration from Environment
    # The Bitnami chart usually sets the same password for Redis and Sentinel
    redis_password = os.getenv("REDIS_PASSWORD")
    sentinel_host = "redis-ha-headless"
    sentinel_port = 26379
    master_name = "mymaster"

    if not redis_password:
        print("Error: REDIS_PASSWORD environment variable not set.")
        sys.exit(1)

    try:
        # 2. Setup Sentinel Connection
        # 'password' is used for the Redis nodes (6379)
        # 'sentinel_kwargs' is used for the Sentinel nodes (26379)
        print(f"Connecting to Sentinels at {sentinel_host}:{sentinel_port}...")
        sentinel = Sentinel(
            [(sentinel_host, sentinel_port)],
            socket_timeout=5,
            password=redis_password,
            sentinel_kwargs={'password': redis_password}
        )

        # 3. Discover the current Master
        print(f"Asking Sentinel for the master address of '{master_name}'...")
        master = sentinel.master_for(
            master_name, 
            socket_timeout=5, 
            password=redis_password
        )

        # 4. Perform Bulk Load using Pipelining
        print("Starting bulk load of 10,000 keys...")
        pipe = master.pipeline()
        
        for i in range(1, 10001):
            pipe.set(f"key:{i}", f"value_{i}")
            
            # Execute in batches of 1,000 to manage memory
            if i % 1000 == 0:
                pipe.execute()
                print(f"Successfully loaded {i} keys...")

        # Execute any remaining commands
        pipe.execute()
        print("--- Bulk load complete! ---")

    except MasterNotFoundError:
        print(f"Error: Could not find a master named '{master_name}'. Check your Sentinel logs.")
        sys.exit(1)
    except Exception as e:
        print(f"An unexpected error occurred: {e}")
        sys.exit(1)
