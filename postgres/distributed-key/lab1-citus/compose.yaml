services:
  coordinator:
    image: citusdata/citus:latest
    ports:
      - "5432:5432"
    environment: &env
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: citus_lab
      POSTGRES_HOST_AUTH_METHOD: trust
    networks:
      - citus-net

  worker-1:
    image: citusdata/citus:latest
    depends_on: [coordinator]
    environment: *env
    networks:
      - citus-net

  worker-2:
    image: citusdata/citus:latest
    depends_on: [coordinator]
    environment: *env
    networks:
      - citus-net


networks:
  citus-net:
    driver: bridge
