apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-traefik-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kubia-clusterip
            port:
              number: 8080
