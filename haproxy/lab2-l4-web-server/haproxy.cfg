global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode http             # Changed to HTTP for better stats visibility
    timeout connect 5s
    timeout client  30s
    timeout server  30s


frontend tcp_front
    bind *:8080
    default_backend tcp_backends

backend tcp_backends
    balance roundrobin
    server backend1 backend1:8080 check
    server backend2 backend2:8080 check
    server backend3 backend3:8080 check

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
    stats auth admin:password  # Added basic security
# <--- Make sure there is at least one empty line here!
